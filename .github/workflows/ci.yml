name: CI

on:
  push:
    branches: [main]
    tags-ignore: ["v*"]     # skip CI when release workflow pushes a tag
  pull_request:

permissions:
  contents: write           # semantic-release needs to push tags

jobs:
  test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run check
        env:
          PYTHONUTF8: "1"
        run: python run_v6.py check

      - name: Run smoke
        env:
          PYTHONUTF8: "1"
        run: python run_v6.py smoke --port 8011

      - name: Run tests
        env:
          PYTHONUTF8: "1"
        run: python -m pytest tests/ -q

  # ── Auto-release: bump version, tag, push ──────────────────────
  release:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install semantic-release
        run: pip install python-semantic-release

      - name: Run semantic-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PYTHONUTF8: "1"
        run: semantic-release version --no-vcs-release
